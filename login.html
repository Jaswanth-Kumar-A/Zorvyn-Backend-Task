<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FinanceOS | Login</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --brand-ink: #0b1f3a;
      --brand-accent: #0ea5e9;
      --page-bg-a: #f4f9ff;
      --page-bg-b: #e9f5ff;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, var(--page-bg-a), var(--page-bg-b));
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 18px 45px rgba(11, 31, 58, 0.15);
      overflow: hidden;
    }

    .brand-strip {
      height: 6px;
      background: linear-gradient(90deg, var(--brand-ink), var(--brand-accent));
    }

    .brand-title {
      color: var(--brand-ink);
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .btn-brand {
      background: linear-gradient(90deg, var(--brand-ink), #174c8f);
      border: 0;
    }

    .btn-brand:hover {
      background: linear-gradient(90deg, #08172b, #103a6e);
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="card login-card">
      <div class="brand-strip"></div>
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="h3 brand-title mb-1">FinanceOS</h1>
          <p class="text-secondary mb-0">Sign in to your Finance Dashboard</p>
        </div>

        <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button id="loginBtn" type="submit" class="btn btn-brand btn-primary w-100 py-2">
            Log In
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    const loginBtn = document.getElementById("loginBtn");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove("d-none");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.add("d-none");
    }

    function parseJwtPayload(token) {
      try {
        const payloadPart = token.split(".")[1];
        if (!payloadPart) return null;
        const decoded = atob(payloadPart.replace(/-/g, "+").replace(/_/g, "/"));
        return JSON.parse(decoded);
      } catch {
        return null;
      }
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      hideError();

      if (!form.checkValidity()) {
        showError("Please enter a valid email and password.");
        return;
      }

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      try {
        const response = await fetch("http://localhost:8000/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          const message = data.detail || data.message || "Login failed. Please check your credentials.";
          throw new Error(message);
        }

        const token = data.access_token;
        if (!token) {
          throw new Error("Login response did not include an access token.");
        }

        localStorage.setItem("token", token);

        const payload = parseJwtPayload(token) || {};
        const role = data.role || payload.role || "";
        localStorage.setItem("role", role);

        window.location.href = "dashboard.html";
      } catch (error) {
        showError(error.message || "Unable to sign in right now. Please try again.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Log In";
      }
    });
  </script>
</body>
</html>
